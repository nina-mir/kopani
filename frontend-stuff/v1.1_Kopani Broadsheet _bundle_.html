document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

y: grid;\n  grid-template-columns: 48px 1fr 48px;\n  align-items: center;\n  gap: 8px;\n}\n.masthead-center { text-align: center; }\n.logo {\n  font-family: var(--display);\n  font-size: clamp(44px, 7vw, 80px);\n  font-weight: 300;\n  letter-spacing: 0.18em;\n  color: var(--ink);\n  line-height: 1;\n  display: block;\n}\n.tagline {\n  font-size: 10px;\n  letter-spacing: 0.2em;\n  text-transform: uppercase;\n  color: var(--ochre);\n  margin-top: 5px;\n}\n.masthead-right { text-align: right; font-size: 11px; color: #7a6a4a; }\n.masthead-right a { display: block; color: var(--blue); font-style: italic; margin-bottom: 3px; }\n.masthead-right a:hover { color: var(--brick); }\n\n/* ── DESKTOP NAV ── */\n.nav {\n  border-top: 1px solid var(--umber);\n  border-bottom: 1px solid var(--umber);\n  padding: 9px 40px;\n  display: flex;\n  gap: 0;\n  justify-content: center;\n  flex-wrap: wrap;\n  overflow-x: auto;\n}\n.nav a {\n  font-family: var(--body);\n  font-size: 12px;\n  letter-spacing: 0.07em;\n  color: var(--ink);\n  text-transform: uppercase;\n  padding: 2px 16px;\n  border-right: 1px solid var(--cream-dark);\n  white-space: nowrap;\n}\n.nav a:last-child { border-right: none; }\n.nav a.active { color: var(--brick); }\n.nav a:hover { color: var(--ochre); }\n\n/* ── HERO + SIDEBAR ── */\n.hero-wrap {\n  display: grid;\n  grid-template-columns: 1fr 340px;\n  border-bottom: 2px solid var(--umber);\n}\n.hero-main {\n  padding: 32px 32px 32px 40px;\n  border-right: 1px solid var(--cream-dark);\n}\n.section-label {\n  font-size: 10px;\n  letter-spacing: 0.22em;\n  text-transform: uppercase;\n  color: var(--brick);\n  margin-bottom: 12px;\n  display: flex;\n  align-items: center;\n  gap: 10px;\n}\n.section-label::after { content: ''; flex: 1; height: 1px; background: var(--brick); opacity: 0.35; }\n\n.hero-img {\n  height: 340px;\n  background: repeating-linear-gradient(45deg, #ddd0b0, #ddd0b0 4px, #d0c4a0 4px, #d0c4a0 9px);\n  border: 1px dashed #b0a078;\n  display: flex;\n  align-items: center;\n  justify-content: center;\n  flex-direction: column;\n  gap: 8px;\n  margin-bottom: 20px;\n  color: #8a7a5a;\n  font-size: 11px;\n  font-style: italic;\n  letter-spacing: 0.06em;\n}\n.hero-img::before {\n  content: '';\n  width: 36px; height: 36px;\n  border: 1px solid #a09060;\n  background: repeating-linear-gradient(-45deg, transparent, transparent 3px, rgba(160,144,96,0.2) 3px, rgba(160,144,96,0.2) 4px);\n}\n.hero-title {\n  font-family: var(--display);\n  font-size: clamp(36px, 4vw, 54px);\n  font-weight: 500;\n  line-height: 1.08;\n  color: var(--ink);\n  margin-bottom: 14px;\n  text-wrap: pretty;\n}\n.hero-dek {\n  font-size: 16px;\n  line-height: 1.68;\n  color: #3a2c1a;\n  font-style: italic;\n  max-width: 560px;\n  margin-bottom: 16px;\n  text-wrap: pretty;\n}\n.hero-meta { font-size: 12px; color: var(--ochre); letter-spacing: 0.04em; }\n.hero-meta strong { color: var(--blue); font-style: italic; }\n.hero-meta .source {\n  display: inline-block;\n  margin-top: 8px;\n  font-size: 11px;\n  color: var(--blue);\n  letter-spacing: 0.08em;\n}\n.hero-meta .source:hover { color: var(--brick); }\n\n/* SIDEBAR */\n.sidebar { padding: 28px 28px 28px 28px; }\n.sidebar-title {\n  font-size: 10px;\n  letter-spacing: 0.2em;\n  text-transform: uppercase;\n  color: var(--ochre);\n  border-bottom: 1px solid var(--cream-dark);\n  padding-bottom: 8px;\n  margin-bottom: 18px;\n}\n.sidebar-item {\n  margin-bottom: 20px;\n  border-bottom: 1px solid var(--cream-dark);\n  padding-bottom: 18px;\n}\n.sidebar-item:last-child { border-bottom: none; margin-bottom: 0; }\n.sidebar-kicker { font-size: 10px; color: var(--brick); text-transform: uppercase; letter-spacing: 0.14em; margin-bottom: 5px; }\n.sidebar-hed {\n  font-family: var(--display);\n  font-size: 21px;\n  font-weight: 500;\n  line-height: 1.22;\n  color: var(--ink);\n  margin-bottom: 5px;\n  text-wrap: pretty;\n}\n.sidebar-hed:hover { color: var(--blue); }\n.sidebar-byline { font-size: 11px; color: #6a5a3a; font-style: italic; margin-bottom: 3px; }\n.sidebar-source { font-size: 10px; color: var(--blue); letter-spacing: 0.07em; }\n\n/* ── JOURNALS TICKER ── */\n.ticker {\n  background: var(--umber);\n  color: var(--cream-dark);\n  padding: 8px 40px;\n  font-size: 11px;\n  letter-spacing: 0.06em;\n  display: flex;\n  align-items: center;\n  gap: 0;\n  overflow: hidden;\n}\n.ticker-label { color: var(--ochre); margin-right: 16px; white-space: nowrap; font-weight: 600; }\n.ticker-journals { opacity: 0.75; font-style: italic; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }\n\n/* ── STORY GRID ── */\n.grid-wrap { display: grid; grid-template-columns: repeat(4, 1fr); border-bottom: 2px solid var(--umber); }\n.grid-item {\n  padding: 24px 24px;\n  border-right: 1px solid var(--cream-dark);\n}\n.grid-item:last-child { border-right: none; }\n.grid-img {\n  height: 130px;\n  margin-bottom: 14px;\n  background: repeating-linear-gradient(45deg, #ddd0b0, #ddd0b0 3px, #d0c4a0 3px, #d0c4a0 7px);\n  border: 1px dashed #b0a078;\n  display: flex;\n  align-items: center;\n  justify-content: center;\n  font-size: 10px;\n  font-style: italic;\n  color: #8a7a5a;\n}\n.grid-kicker { font-size: 10px; color: var(--brick); text-transform: uppercase; letter-spacing: 0.13em; margin-bottom: 7px; }\n.grid-hed {\n  font-family: var(--display);\n  font-size: 24px;\n  font-weight: 500;\n  line-height: 1.2;\n  color: var(--ink);\n  margin-bottom: 9px;\n  text-wrap: pretty;\n}\n.grid-hed:hover { color: var(--blue); }\n.grid-dek { font-size: 13px; line-height: 1.62; color: #4a3820; font-style: italic; margin-bottom: 9px; text-wrap: pretty; }\n.grid-meta { font-size: 11px; color: var(--ochre); }\n.grid-meta strong { color: var(--blue); font-style: italic; }\n\n/* ── SECOND ROW: wide + narrow ── */\n.wide-narrow {\n  display: grid;\n  grid-template-columns: 2fr 1fr;\n  border-bottom: 2px solid var(--umber);\n}\n.wide-item {\n  padding: 28px 32px;\n  border-right: 1px solid var(--cream-dark);\n  display: grid;\n  grid-template-columns: 200px 1fr;\n  gap: 24px;\n}\n.wide-img {\n  height: 180px;\n  background: repeating-linear-gradient(45deg, #ddd0b0, #ddd0b0 3px, #d0c4a0 3px, #d0c4a0 7px);\n  border: 1px dashed #b0a078;\n  display: flex;\n  align-items: center;\n  justify-content: center;\n  font-size: 10px;\n  font-style: italic;\n  color: #8a7a5a;\n}\n.wide-body .grid-kicker { margin-bottom: 8px; }\n.wide-body .grid-hed { font-size: 28px; }\n.wide-body .grid-dek { font-size: 14px; }\n\n.narrow-stack { padding: 0; }\n.narrow-item {\n  padding: 22px 28px;\n  border-bottom: 1px solid var(--cream-dark);\n}\n.narrow-item:last-child { border-bottom: none; }\n.narrow-hed {\n  font-family: var(--display);\n  font-size: 20px;\n  font-weight: 500;\n  line-height: 1.25;\n  color: var(--ink);\n  margin-bottom: 5px;\n}\n.narrow-hed:hover { color: var(--blue); }\n.narrow-meta { font-size: 11px; color: var(--ochre); }\n\n/* ── FOOTER ── */\n.footer {\n  background: var(--blue);\n  color: var(--cream);\n  padding: 10px 40px;\n  display: flex;\n  justify-content: space-between;\n  align-items: center;\n  font-size: 11px;\n}\n.footer-logo {\n  font-family: var(--display);\n  font-size: 22px;\n  font-weight: 300;\n  letter-spacing: 0.2em;\n  color: var(--cream);\n}\n.footer-links { display: flex; gap: 18px; color: #a0b4d4; }\n.footer-links a:hover { color: var(--cream); }\n.footer-note { font-style: italic; color: #c8b890; }\n\n/* ── HAMBURGER BUTTON ── */\n.nav-toggle {\n  background: none;\n  border: none;\n  cursor: pointer;\n  padding: 6px 4px;\n  color: var(--ink);\n  display: flex;\n  flex-direction: column;\n  gap: 5px;\n  align-items: center;\n  justify-content: center;\n}\n.nav-toggle .bar {\n  display: block;\n  width: 22px;\n  height: 1.5px;\n  background: var(--ink);\n  transition: transform 0.26s ease, opacity 0.2s ease;\n  transform-origin: center;\n}\n.nav-toggle[aria-expanded=\"true\"] .bar:nth-child(1) { transform: translateY(6.5px) rotate(45deg); }\n.nav-toggle[aria-expanded=\"true\"] .bar:nth-child(2) { opacity: 0; }\n.nav-toggle[aria-expanded=\"true\"] .bar:nth-child(3) { transform: translateY(-6.5px) rotate(-45deg); }\n\n/* ── OVERLAY DRAWER ── */\n.nav-overlay {\n  position: fixed;\n  inset: 0;\n  z-index: 200;\n  pointer-events: none;\n}\n.nav-overlay.open { pointer-events: all; }\n\n.nav-backdrop {\n  position: absolute;\n  inset: 0;\n  background: rgba(28, 18, 8, 0);\n  transition: background 0.3s ease;\n  cursor: pointer;\n}\n.nav-overlay.open .nav-backdrop { background: rgba(28, 18, 8, 0.55); }\n\n.nav-drawer {\n  position: absolute;\n  top: 0;\n  left: 0;\n  bottom: 0;\n  width: 300px;\n  background: var(--cream);\n  border-right: 2px solid var(--umber);\n  display: flex;\n  flex-direction: column;\n  transform: translateX(-100%);\n  transition: transform 0.32s cubic-bezier(0.4, 0, 0.2, 1);\n  overflow-y: auto;\n}\n.nav-overlay.open .nav-drawer { transform: translateX(0); }\n\n.nav-drawer-header {\n  padding: 20px 24px 14px;\n  border-bottom: 3px double var(--umber);\n  display: flex;\n  align-items: center;\n  justify-content: space-between;\n}\n.nav-drawer-logo {\n  font-family: var(--display);\n  font-size: 28px;\n  font-weight: 300;\n  letter-spacing: 0.18em;\n  color: var(--ink);\n}\n.nav-drawer-close {\n  background: none;\n  border: none;\n  cursor: pointer;\n  font-size: 22px;\n  color: var(--umber);\n  line-height: 1;\n  padding: 2px 4px;\n}\n.nav-drawer-close:hover { color: var(--brick); }\n\n.nav-drawer-section {\n  padding: 10px 0 6px 24px;\n  font-size: 9px;\n  letter-spacing: 0.22em;\n  text-transform: uppercase;\n  color: var(--ochre);\n  border-bottom: 1px solid var(--cream-dark);\n}\n.nav-drawer a {\n  font-family: var(--body);\n  font-size: 16px;\n  letter-spacing: 0.06em;\n  text-transform: uppercase;\n  color: var(--ink);\n  padding: 15px 24px;\n  border-bottom: 1px solid var(--cream-dark);\n  display: block;\n  transition: color 0.15s, background 0.15s;\n}\n.nav-drawer a:last-c 2Fdiv>\n  <div class=\"masthead-right\">\n    <a href=\"#\">RSS<\u002Fa>\n    <a href=\"#\">Submit<\u002Fa>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- NAV -->\n<nav class=\"nav\">\n  <a href=\"#\" class=\"active\">All<\u002Fa>\n  <a href=\"#\">Essays<\u002Fa>\n  <a href=\"#\">Fiction<\u002Fa>\n  <a href=\"#\">Poetry<\u002Fa>\n  <a href=\"#\">Interviews<\u002Fa>\n  <a href=\"#\">Art &amp; Photography<\u002Fa>\n  <a href=\"#\">Reviews<\u002Fa>\n  <a href=\"#\">Translation<\u002Fa>\n  <a href=\"#\">Editors' Picks<\u002Fa>\n<\u002Fnav>\n\n<!-- HERO + SIDEBAR -->\n<div class=\"hero-wrap\">\n  <div class=\"hero-main\">\n    <div class=\"section-label\">Editor's Pick · Fiction<\u002Fdiv>\n    <div class=\"hero-img\">editorial photograph<\u002Fdiv>\n    <h1 class=\"hero-title\">The Last Room on the Amstel<\u002Fh1>\n    <p class=\"hero-dek\">\n      A story tracing three generations of a family through a single canal house — told in prose of extraordinary restraint and beauty, translated here for the first time into English.\n    <\u002Fp>\n    <div class=\"hero-meta\">\n      By <strong>Maartje Voskuil<\u002Fstrong> &nbsp;·&nbsp; Translated by David McKay &nbsp;·&nbsp;\n      <a href=\"#\" class=\"source\">↗ The Paris Review, No. 248<\u002Fa>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"sidebar\">\n    <div class=\"sidebar-title\">Also Notable<\u002Fdiv>\n\n    <div class=\"sidebar-item\">\n      <div class=\"sidebar-kicker\">Essay<\u002Fdiv>\n      <div class=\"sidebar-hed\">On the Pleasure of Not Knowing<\u002Fdiv>\n      <div class=\"sidebar-byline\">by Jhumpa Lahiri<\u002Fdiv>\n      <div class=\"sidebar-source\">↗ Granta 162<\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"sidebar-item\">\n      <div class=\"sidebar-kicker\">Poetry<\u002Fdiv>\n      <div class=\"sidebar-hed\">Seven Elegies for the Voiceless<\u002Fdiv>\n      <div class=\"sidebar-byline\">by Ocean Vuong<\u002Fdiv>\n      <div class=\"sidebar-source\">↗ The Kenyon Review<\u002Fdiv>\n    <\u002Fdiv>\n\n   <h2 class=\"grid-hed\">Against Conclusions<\u002Fh2>\n    <p class=\"grid-dek\">Why the best essays resist the urge to resolve — an appreciation of irreducible thought.<\u002Fp>\n    <div class=\"grid-meta\">by <strong>Leslie Jamison<\u002Fstrong> &nbsp;·&nbsp; The Believer<\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"grid-item\">\n    <div class=\"grid-img\">photograph<\u002Fdiv>\n    <div class=\"grid-kicker\">Poetry<\u002Fdiv>\n    <h2 class=\"grid-hed\">New Work: Fourteen Sonnets<\u002Fh2>\n    <p class=\"grid-dek\">A debut sequence of restrained formal beauty, from a poet to watch closely.<\u002Fp>\n    <div class=\"grid-meta\">by <strong>Natalie Shapero<\u002Fstrong> &nbsp;·&nbsp; Ploughshares<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- WIDE + NARROW ROW -->\n<div class=\"wide-narrow\">\n  <div class=\"wide-item\">\n    <div class=\"wide-img\">photograph<\u002Fdiv>\n    <div class=\"wide-body\">\n      <div class=\"grid-kicker\">Essay<\u002Fdiv>\n      <h2 class=\"grid-hed\">The Interior Sentence<\u002Fh2>\n      <p class=\"grid-dek\">A close reading of what punctuation actually does to time — from the comma's suspension to the em dash's ambush. Ben Lerner at his most precise.<\u002Fp>\n      <div class=\"grid-meta\">by <strong>Ben Lerner<\u002Fstrong> &nbsp;·&nbsp; n+1<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"narrow-stack\">\n    <div class=\"narrow-item\">\n      <div class=\"grid-kicker\">Interview<\u002Fdiv>\n      <div class=\"narrow-hed\">Colm Tóibín on Grief, Distance, and the Novel<\u002Fdiv>\n      <div class=\"narrow-meta\">The Paris Review<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"narrow-item\">\n      <div class=\"grid-kicker\">Fiction<\u002Fdiv>\n      <div class=\"narrow-hed\">A Glass of Water at the End of the World<\u002Fdiv>\n      <div class=\"narrow-meta\">by <strong>Yoko Ogawa<\u002Fstrong> &nbsp;·&nbsp; Granta<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"narrow-item\">\n      <div class=\"grid-kicker\">Review<\
